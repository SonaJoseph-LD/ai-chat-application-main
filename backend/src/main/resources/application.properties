spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

server.port=8080

jwt.secret=${JWT_SECRET:your_jwt_secret}
jwt.expiration=${JWT_EXPIRATION:86400}

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

logging.level.org.springframework=INFO
logging.level.com.example.chat=DEBUG
